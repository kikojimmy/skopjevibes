<!DOCTYPE html>
<html lang="mk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkopjeVibes – Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #0d0d0d; color: #f5f0e8; min-height: 100vh; padding: 24px 20px 60px; }

    /* Login screen */
    #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 16px; }
    #login-screen h2 { font-family: 'Syne', sans-serif; font-size: 24px; }
    #login-screen input { width: 260px; background: #161616; border: 1px solid #2a2a2a; color: #f5f0e8; padding: 12px 16px; border-radius: 12px; font-size: 15px; outline: none; }
    #login-screen button { width: 260px; background: #ff5c35; color: #fff; border: none; border-radius: 12px; padding: 13px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; }
    #login-error { color: #ff5c35; font-size: 13px; display: none; }

    /* Admin panel */
    #admin-panel { display: none; max-width: 500px; margin: 0 auto; }
    .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; padding-bottom: 16px; border-bottom: 1px solid #1f1f1f; }
    .admin-header h1 { font-family: 'Syne', sans-serif; font-size: 20px; }
    .admin-header h1 span { color: #ff5c35; }
    .logout-btn { font-size: 12px; color: #555; cursor: pointer; border: 1px solid #2a2a2a; padding: 5px 12px; border-radius: 20px; background: none; color: #888; }

    .section-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 16px; color: #ff5c35; }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #666; margin-bottom: 6px; }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: #161616;
      border: 1px solid #2a2a2a;
      color: #f5f0e8;
      padding: 11px 14px;
      border-radius: 12px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: #ff5c35; }
    .form-group select option { background: #161616; }
    .form-group textarea { resize: vertical; min-height: 80px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .date-row { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 8px; }

    .submit-btn {
      width: 100%;
      background: #ff5c35;
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .submit-btn:hover { background: #ff4520; }
    .submit-btn:disabled { background: #333; cursor: not-allowed; }

    .success-msg { background: #0a2a0a; border: 1px solid #1a4a1a; color: #4cff91; padding: 12px 16px; border-radius: 12px; font-size: 13px; margin-top: 14px; display: none; text-align: center; }
    .error-msg   { background: #2a0a0a; border: 1px solid #4a1a1a; color: #ff5c35; padding: 12px 16px; border-radius: 12px; font-size: 13px; margin-top: 14px; display: none; text-align: center; }

    /* Events list */
    .events-section { margin-top: 36px; }
    .event-item { background: #161616; border: 1px solid #1f1f1f; border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .event-info { flex: 1; min-width: 0; }
    .event-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .event-meta  { font-size: 11px; color: #555; margin-top: 2px; }
    .delete-btn  { flex-shrink: 0; background: #2a0a0a; border: 1px solid #4a1a1a; color: #ff5c35; padding: 6px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; transition: background 0.15s; }
    .delete-btn:hover { background: #3a0a0a; }
    .edit-btn    { flex-shrink: 0; background: #0a1a2a; border: 1px solid #1a3a5a; color: #5599ff; padding: 6px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; transition: background 0.15s; }
    .edit-btn:hover { background: #0f2540; }
    .event-actions { display: flex; gap: 6px; }
    .cancel-btn  { width: 100%; background: none; border: 1px solid #2a2a2a; color: #888; border-radius: 14px; padding: 12px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; margin-top: 8px; transition: border-color 0.15s; display: none; }
    .cancel-btn:hover { border-color: #555; color: #f5f0e8; }
    .empty-list { text-align: center; color: #444; font-size: 13px; padding: 24px 0; }

    .img-field-wrap { display: flex; gap: 8px; }
    .img-field-wrap input { flex: 1; min-width: 0; }
    .upload-btn {
      flex-shrink: 0; background: #1f1f1f; border: 1px solid #2a2a2a; color: #aaa;
      border-radius: 12px; padding: 0 14px; font-size: 13px; font-family: 'DM Sans', sans-serif;
      cursor: pointer; white-space: nowrap; transition: border-color 0.15s, color 0.15s;
      display: flex; align-items: center; gap: 6px;
    }
    .upload-btn:hover { border-color: #ff5c35; color: #f5f0e8; }

  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <h2>🔐 Admin панел</h2>
  <input type="email"    id="email-input" placeholder="Е-пошта" onkeydown="if(event.key==='Enter')checkLogin()" />
  <input type="password" id="pwd-input"   placeholder="Лозинка" onkeydown="if(event.key==='Enter')checkLogin()" />
  <button onclick="checkLogin()">Влез</button>
  <span id="login-error"></span>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <div class="admin-header">
    <h1>Skopje<span>Vibes</span> Admin</h1>
    <button class="logout-btn" onclick="logout()">Излез</button>
  </div>

  <!-- ADD EVENT FORM -->
  <div class="section-title" id="form-title">+ Додај настан</div>

  <div class="form-group">
    <label>Наслов на настанот</label>
    <input type="text" id="f-title" placeholder="пр. Techno Night w/ DJ Marko" />
  </div>

  <div class="form-group">
    <label>Локал (пресет)</label>
    <select id="f-venue" onchange="applyVenuePreset()">
      <option value="">— Избери локал или внеси рачно —</option>
      <option value="Exit"            data-lat="42.0007" data-lng="21.4048" data-place="Club Exit">Club Exit</option>
      <option value="Colosseum"       data-lat="42.0015" data-lng="21.4257" data-place="Colosseum">Colosseum</option>
      <option value="Havana"          data-lat="41.9956" data-lng="21.4238" data-place="Club Havana">Club Havana</option>
      <option value="Marakana"        data-lat="42.0012" data-lng="21.4264" data-place="Marakana">Marakana</option>
      <option value="Chair"           data-lat="42.0010" data-lng="21.4183" data-place="Chair">Chair</option>
      <option value="MKC"             data-lat="41.9978" data-lng="21.4247" data-place="МКЦ">МКЦ</option>
      <option value="Filharmonija"    data-lat="42.0054" data-lng="21.4382" data-place="Филхармонија">Филхармонија</option>
      <option value="NacionalenTeatar" data-lat="41.9971" data-lng="21.4317" data-place="Национален театар">Национален театар</option>
      <option value="ArenaBT"         data-lat="41.9831" data-lng="21.4060" data-place="Арена Борис Трајковски">Арена Борис Трајковски</option>
      <option value="PublicRoom"      data-lat="41.9961" data-lng="21.4300" data-place="Public Room">Public Room</option>
      <option value="Tribeca"         data-lat="41.9959" data-lng="21.4322" data-place="Tribeca">Tribeca</option>
      <option value="DomNaArmijata"   data-lat="41.9975" data-lng="21.4319" data-place="Дом на армијата">Дом на армијата</option>
      <option value="JaneSandanski"   data-lat="42.0092" data-lng="21.4233" data-place="СЦ Јане Сандански">СЦ Јане Сандanski</option>
      <option value="MariotHotel"     data-lat="42.0019" data-lng="21.4354" data-place="Хотел Мариот">Хотел Мариот</option>
      <option value="Kale"            data-lat="42.0044" data-lng="21.4248" data-place="Кале">Кале</option>
    </select>
  </div>

  <div class="form-group">
    <label>Место / Клуб</label>
    <input type="text" id="f-place" placeholder="пр. Club Havana" />
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Латитуда (lat)</label>
      <input type="number" id="f-lat" placeholder="42.0003" step="0.0001" />
    </div>
    <div class="form-group">
      <label>Лонгитуда (lng)</label>
      <input type="number" id="f-lng" placeholder="21.4290" step="0.0001" />
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Категорија</label>
      <select id="f-kategorija">
        <option value="klub">🎧 Клуб</option>
        <option value="koncert">🎵 Концерт</option>
        <option value="bar">🍹 Бар</option>
        <option value="kafana">🍺 Кафана</option>
        <option value="sport-kultura">⚽ Спорт и Култура</option>
      </select>
    </div>
    <div class="form-group">
      <label>Emoji (за картичка)</label>
      <input type="text" id="f-emoji" placeholder="🎧" maxlength="4" />
    </div>
  </div>

  <div class="form-group">
    <label>Датум</label>
    <div class="date-row">
      <select id="f-day"></select>
      <select id="f-month"></select>
      <select id="f-year"></select>
    </div>
  </div>

  <div class="form-group">
    <label>Време</label>
    <input type="text" id="f-vreme" placeholder="20:00" />
  </div>

  <div class="form-group">
    <label>Слика (URL)</label>
    <div class="img-field-wrap">
      <input type="url" id="f-image-url" placeholder="https://..." />
      <button class="upload-btn" id="upload-btn" onclick="openCloudinary()" type="button">
        📷 Избери слика
      </button>
    </div>
  </div>

  <div class="form-group">
    <label>Локација (URL)</label>
    <input type="url" id="f-location" placeholder="https://maps.google.com/..." />
  </div>

  <div class="form-group">
    <label>Линк (може да биде Instagram, Facebook, ticket страна или било кој друг линк)</label>
    <input type="url" id="f-link" placeholder="https://..." />
  </div>

  <div class="form-group">
    <label>Badge (цена, промоција...)</label>
    <input type="text" id="f-badge" placeholder="пр. Free Entry до 24h · или остави празно" />
  </div>

  <div class="form-group">
    <label>Опис</label>
    <textarea id="f-desc" placeholder="Краток опис на настанот..."></textarea>
  </div>

  <button class="submit-btn" id="submit-btn" onclick="saveNastan()">Додај настан</button>
  <button class="cancel-btn" id="cancel-btn" onclick="cancelEdit()">Откажи</button>
  <div class="success-msg" id="success-msg">✅ Зачувано!</div>
  <div class="error-msg"   id="error-msg">❌ Грешка. Провери ги полињата.</div>

  <!-- EVENTS LIST -->
  <div class="events-section">
    <div class="section-title">Постоечки настани</div>
    <div id="events-list"><div class="empty-list">Вчитување...</div></div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://upload-widget.cloudinary.com/global/all.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDOxqfSkmXbRYbMW0ph2aOM-35BDJOAk5E",
    authDomain: "skopjevibes-df97b.firebaseapp.com",
    projectId: "skopjevibes-df97b",
    storageBucket: "skopjevibes-df97b.firebasestorage.app",
    messagingSenderId: "534773019597",
    appId: "1:534773019597:web:82ff3ea8a88f43eee90a84",
    measurementId: "G-HWH14N5VSV"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  // ── Auth state ──
  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-panel').style.display  = 'block';
      buildDateDropdowns(new Date());
      loadEventsList();
    } else {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('admin-panel').style.display  = 'none';
    }
  });

  // ── Cloudinary upload widget ──
  let cloudinaryWidget;
  function openCloudinary() {
    if (!cloudinaryWidget) {
      cloudinaryWidget = cloudinary.createUploadWidget(
        {
          cloudName:    'dmvqjlvcj',
          uploadPreset: 'skopjevibes',
          sources:      ['local', 'camera', 'url'],
          multiple:     false,
          folder:       'skopjevibes',
          clientAllowedFormats: ['jpg', 'jpeg', 'png', 'webp', 'gif'],
          maxFileSize:  5000000,
          styles: {
            palette: {
              window:      '#161616',
              windowBorder:'#2a2a2a',
              tabIcon:     '#ff5c35',
              menuIcons:   '#aaaaaa',
              textDark:    '#f5f0e8',
              textLight:   '#f5f0e8',
              link:        '#ff5c35',
              action:      '#ff5c35',
              inactiveTabIcon: '#555555',
              error:       '#ff5c35',
              inProgress:  '#ff5c35',
              complete:    '#4cff91',
              sourceBg:    '#0d0d0d',
            },
          },
        },
        (error, result) => {
          if (error) { console.error('Cloudinary error:', error); return; }
          if (result.event === 'success') {
            document.getElementById('f-image-url').value = result.info.secure_url;
          }
        }
      );
    }
    cloudinaryWidget.open();
  }

  // ── Venue preset ──
  function applyVenuePreset() {
    const sel = document.getElementById('f-venue');
    const opt = sel.options[sel.selectedIndex];
    if (!opt || !opt.dataset.lat) return;
    document.getElementById('f-place').value = opt.dataset.place || '';
    document.getElementById('f-lat').value   = opt.dataset.lat   || '';
    document.getElementById('f-lng').value   = opt.dataset.lng   || '';
  }

  let editingId = null;
  const MK_MONTHS = ['Јануари','Февруари','Март','Април','Мај','Јуни','Јули','Август','Септември','Октомври','Ноември','Декември'];

  function buildDateDropdowns(date) {
    const dayEl   = document.getElementById('f-day');
    const monthEl = document.getElementById('f-month');
    const yearEl  = document.getElementById('f-year');
    dayEl.innerHTML   = Array.from({length:31}, (_,i) => `<option value="${String(i+1).padStart(2,'0')}">${i+1}</option>`).join('');
    monthEl.innerHTML = MK_MONTHS.map((m,i) => `<option value="${String(i+1).padStart(2,'0')}">${m}</option>`).join('');
    const curYear = date.getFullYear();
    yearEl.innerHTML  = [curYear, curYear+1].map(y => `<option value="${y}">${y}</option>`).join('');
    dayEl.value   = String(date.getDate()).padStart(2,'0');
    monthEl.value = String(date.getMonth()+1).padStart(2,'0');
    yearEl.value  = String(curYear);
  }

  function getDateValue() {
    const d = document.getElementById('f-day').value;
    const m = document.getElementById('f-month').value;
    const y = document.getElementById('f-year').value;
    return `${y}-${m}-${d}`;
  }

  async function checkLogin() {
    const email = document.getElementById('email-input').value.trim();
    const pwd   = document.getElementById('pwd-input').value;
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none';
    try {
      await auth.signInWithEmailAndPassword(email, pwd);
    } catch (err) {
      errEl.textContent    = 'Погрешна е-пошта или лозинка';
      errEl.style.display  = 'block';
    }
  }

  function logout() {
    auth.signOut();
  }

  function editNastan(id, n) {
    editingId = id;
    document.getElementById('form-title').textContent = '✏️ Уреди настан';
    document.getElementById('submit-btn').textContent = 'Зачувај промени';
    document.getElementById('cancel-btn').style.display = 'block';
    document.getElementById('success-msg').style.display = 'none';
    document.getElementById('error-msg').style.display   = 'none';

    document.getElementById('f-title').value     = n.title || '';
    document.getElementById('f-place').value     = n.place || '';
    document.getElementById('f-kategorija').value = n.kategorija || 'klub';
    document.getElementById('f-emoji').value     = n.imgEmoji || '';
    document.getElementById('f-vreme').value     = n.vreme || '';
    document.getElementById('f-image-url').value = n.imgSrc || '';
    document.getElementById('f-location').value  = n.location || '';
    document.getElementById('f-link').value      = n.instagramUrl || '';
    document.getElementById('f-badge').value     = n.badge || '';
    document.getElementById('f-desc').value      = n.desc || '';
    document.getElementById('f-lat').value       = n.lat != null ? n.lat : '';
    document.getElementById('f-lng').value       = n.lng != null ? n.lng : '';
    document.getElementById('f-venue').value     = '';

    if (n.datum) {
      const eventDate = new Date(n.datum + 'T00:00:00');
      buildDateDropdowns(eventDate);
    }

    document.getElementById('form-title').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function cancelEdit() {
    editingId = null;
    document.getElementById('form-title').textContent = '+ Додај настан';
    document.getElementById('submit-btn').textContent = 'Додај настан';
    document.getElementById('cancel-btn').style.display = 'none';
    document.getElementById('success-msg').style.display = 'none';
    document.getElementById('error-msg').style.display   = 'none';
    document.getElementById('f-title').value     = '';
    document.getElementById('f-place').value     = '';
    document.getElementById('f-emoji').value     = '';
    document.getElementById('f-badge').value     = '';
    document.getElementById('f-desc').value      = '';
    document.getElementById('f-vreme').value     = '';
    document.getElementById('f-image-url').value = '';
    document.getElementById('f-location').value  = '';
    document.getElementById('f-link').value      = '';
    document.getElementById('f-lat').value       = '';
    document.getElementById('f-lng').value       = '';
    document.getElementById('f-venue').value     = '';
    buildDateDropdowns(new Date());
  }

  async function saveNastan() {
    const title      = document.getElementById('f-title').value.trim();
    const place      = document.getElementById('f-place').value.trim();
    const kategorija = document.getElementById('f-kategorija').value;
    const emoji      = document.getElementById('f-emoji').value.trim() || '🎉';
    const datum      = getDateValue();
    const vreme      = document.getElementById('f-vreme').value.trim() || '20:00';
    const badge        = document.getElementById('f-badge').value.trim();
    const desc         = document.getElementById('f-desc').value.trim();
    const imgSrc       = document.getElementById('f-image-url').value.trim();
    const location     = document.getElementById('f-location').value.trim();
    const instagramUrl = document.getElementById('f-link').value.trim();
    const latRaw       = document.getElementById('f-lat').value.trim();
    const lngRaw       = document.getElementById('f-lng').value.trim();
    const lat          = latRaw ? parseFloat(latRaw) : null;
    const lng          = lngRaw ? parseFloat(lngRaw) : null;
    if (!title || !place || !datum) {
      document.getElementById('error-msg').style.display   = 'block';
      document.getElementById('success-msg').style.display = 'none';
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled    = true;
    btn.textContent = 'Зачувување...';

    try {
      const data = { title, place, kategorija, imgEmoji: emoji, imgSrc, datum, vreme, badge, desc, location, instagramUrl, lat, lng };
      if (editingId) {
        await db.collection('nastani').doc(editingId).update(data);
      } else {
        await db.collection('nastani').add({ ...data, createdAt: new Date().toISOString() });
      }

      document.getElementById('success-msg').style.display = 'block';
      document.getElementById('error-msg').style.display   = 'none';
      cancelEdit();
      loadEventsList();
    } catch (err) {
      document.getElementById('error-msg').style.display   = 'block';
      document.getElementById('success-msg').style.display = 'none';
      console.error(err);
    }

    btn.disabled    = false;
    btn.textContent = editingId ? 'Зачувај промени' : 'Додај настан';
  }

  async function loadEventsList() {
    const listEl = document.getElementById('events-list');
    try {
      const snap = await db.collection('nastani').orderBy('datum').get();
      if (snap.empty) {
        listEl.innerHTML = '<div class="empty-list">Нема настани</div>';
        return;
      }
      listEl.innerHTML = snap.docs.map(d => {
        const n = d.data();
        const safe = encodeURIComponent(JSON.stringify(n));
        return `
          <div class="event-item">
            <div class="event-info">
              <div class="event-title">${n.imgEmoji || ''} ${n.title}</div>
              <div class="event-meta">${n.place} · ${n.datum} · ${n.vreme}</div>
            </div>
            <div class="event-actions">
              <button class="edit-btn"   onclick="editNastan('${d.id}', JSON.parse(decodeURIComponent('${safe}')))">Уреди</button>
              <button class="delete-btn" onclick="deleteNastan('${d.id}')">Избриши</button>
            </div>
          </div>
        `;
      }).join('');
    } catch (err) {
      listEl.innerHTML = '<div class="empty-list">Грешка при вчитување</div>';
    }
  }

  async function deleteNastan(id) {
    if (!confirm('Сигурен си дека сакаш да го избришеш настанот?')) return;
    try {
      await db.collection('nastani').doc(id).delete();
      loadEventsList();
    } catch (err) {
      alert('Грешка при бришење');
    }
  }
</script>
