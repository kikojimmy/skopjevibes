<!DOCTYPE html>
<html lang="mk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkopjeVibes – Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #0d0d0d; color: #f5f0e8; min-height: 100vh; padding: 24px 20px 60px; }

    /* Login screen */
    #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 16px; }
    #login-screen h2 { font-family: 'Syne', sans-serif; font-size: 24px; }
    #login-screen input { width: 260px; background: #161616; border: 1px solid #2a2a2a; color: #f5f0e8; padding: 12px 16px; border-radius: 12px; font-size: 15px; outline: none; }
    #login-screen button { width: 260px; background: #ff5c35; color: #fff; border: none; border-radius: 12px; padding: 13px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; }
    #login-error { color: #ff5c35; font-size: 13px; display: none; }

    /* Admin panel */
    #admin-panel { display: none; max-width: 500px; margin: 0 auto; }
    .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; padding-bottom: 16px; border-bottom: 1px solid #1f1f1f; }
    .admin-header h1 { font-family: 'Syne', sans-serif; font-size: 20px; }
    .admin-header h1 span { color: #ff5c35; }
    .logout-btn { font-size: 12px; color: #555; cursor: pointer; border: 1px solid #2a2a2a; padding: 5px 12px; border-radius: 20px; background: none; color: #888; }

    .section-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 16px; color: #ff5c35; }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #666; margin-bottom: 6px; }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: #161616;
      border: 1px solid #2a2a2a;
      color: #f5f0e8;
      padding: 11px 14px;
      border-radius: 12px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: #ff5c35; }
    .form-group select option { background: #161616; }
    .form-group textarea { resize: vertical; min-height: 80px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .date-row { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 8px; }

    .file-input-wrap { position: relative; }
    .file-input-wrap input[type="file"] { opacity: 0; position: absolute; inset: 0; cursor: pointer; }
    .file-input-label { display: flex; align-items: center; gap: 8px; background: #161616; border: 1px dashed #2a2a2a; color: #666; padding: 11px 14px; border-radius: 12px; font-size: 14px; cursor: pointer; transition: border-color 0.15s; }
    .file-input-label:hover { border-color: #ff5c35; color: #aaa; }
    .file-input-label.has-file { border-color: #ff5c35; color: #f5f0e8; }

    .submit-btn {
      width: 100%;
      background: #ff5c35;
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .submit-btn:hover { background: #ff4520; }
    .submit-btn:disabled { background: #333; cursor: not-allowed; }

    .success-msg { background: #0a2a0a; border: 1px solid #1a4a1a; color: #4cff91; padding: 12px 16px; border-radius: 12px; font-size: 13px; margin-top: 14px; display: none; text-align: center; }
    .error-msg   { background: #2a0a0a; border: 1px solid #4a1a1a; color: #ff5c35; padding: 12px 16px; border-radius: 12px; font-size: 13px; margin-top: 14px; display: none; text-align: center; }

    /* Events list */
    .events-section { margin-top: 36px; }
    .event-item { background: #161616; border: 1px solid #1f1f1f; border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .event-info { flex: 1; min-width: 0; }
    .event-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .event-meta  { font-size: 11px; color: #555; margin-top: 2px; }
    .delete-btn  { flex-shrink: 0; background: #2a0a0a; border: 1px solid #4a1a1a; color: #ff5c35; padding: 6px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; transition: background 0.15s; }
    .delete-btn:hover { background: #3a0a0a; }
    .empty-list { text-align: center; color: #444; font-size: 13px; padding: 24px 0; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <h2>🔐 Admin панел</h2>
  <input type="password" id="pwd-input" placeholder="Лозинка" onkeydown="if(event.key==='Enter')checkLogin()" />
  <button onclick="checkLogin()">Влез</button>
  <span id="login-error">Погрешна лозинка</span>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <div class="admin-header">
    <h1>Skopje<span>Vibes</span> Admin</h1>
    <button class="logout-btn" onclick="logout()">Излез</button>
  </div>

  <!-- ADD EVENT FORM -->
  <div class="section-title">+ Додај настан</div>

  <div class="form-group">
    <label>Наслов на настанот</label>
    <input type="text" id="f-title" placeholder="пр. Techno Night w/ DJ Marko" />
  </div>

  <div class="form-group">
    <label>Место / Клуб</label>
    <input type="text" id="f-place" placeholder="пр. Club Havana" />
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Категорија</label>
      <select id="f-kategorija">
        <option value="klub">🎧 Клуб</option>
        <option value="koncert">🎵 Концерт</option>
        <option value="bar">🍹 Бар</option>
        <option value="sport">⚽ Спорт</option>
        <option value="kultura">🎭 Култура</option>
      </select>
    </div>
    <div class="form-group">
      <label>Emoji (за картичка)</label>
      <input type="text" id="f-emoji" placeholder="🎧" maxlength="4" />
    </div>
  </div>

  <div class="form-group">
    <label>Датум</label>
    <div class="date-row">
      <select id="f-day"></select>
      <select id="f-month"></select>
      <select id="f-year"></select>
    </div>
  </div>

  <div class="form-group">
    <label>Време</label>
    <input type="text" id="f-vreme" placeholder="20:00" />
  </div>

  <div class="form-group">
    <label>Слика на настанот</label>
    <div class="file-input-wrap">
      <div class="file-input-label" id="file-label">📷 Избери слика...</div>
      <input type="file" id="f-image" accept="image/*" onchange="updateFileLabel(this)" />
    </div>
  </div>

  <div class="form-group">
    <label>Badge (цена, промоција...)</label>
    <input type="text" id="f-badge" placeholder="пр. Free Entry до 24h · или остави празно" />
  </div>

  <div class="form-group">
    <label>Опис</label>
    <textarea id="f-desc" placeholder="Краток опис на настанот..."></textarea>
  </div>

  <div class="form-group">
    <label>Линк (Facebook, website...)</label>
    <input type="url" id="f-link" placeholder="https://facebook.com/event/..." />
  </div>

  <button class="submit-btn" id="submit-btn" onclick="addNastan()">Додај настан</button>
  <div class="success-msg" id="success-msg">✅ Настанот е додаден!</div>
  <div class="error-msg"   id="error-msg">❌ Грешка. Провери ги полињата.</div>

  <!-- EVENTS LIST -->
  <div class="events-section">
    <div class="section-title">Постоечки настани</div>
    <div id="events-list"><div class="empty-list">Вчитување...</div></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDOxqfSkmXbRYbMW0ph2aOM-35BDJOAk5E",
    authDomain: "skopjevibes-df97b.firebaseapp.com",
    projectId: "skopjevibes-df97b",
    storageBucket: "skopjevibes-df97b.firebasestorage.app",
    messagingSenderId: "534773019597",
    appId: "1:534773019597:web:82ff3ea8a88f43eee90a84",
    measurementId: "G-HWH14N5VSV"
  };

  firebase.initializeApp(firebaseConfig);
  const db      = firebase.firestore();
  const storage = firebase.storage();

  const ADMIN_PASSWORD = "skopjevibes2025";
  const MK_MONTHS = ['Јануари','Февруари','Март','Април','Мај','Јуни','Јули','Август','Септември','Октомври','Ноември','Декември'];

  function buildDateDropdowns(date) {
    const dayEl   = document.getElementById('f-day');
    const monthEl = document.getElementById('f-month');
    const yearEl  = document.getElementById('f-year');
    dayEl.innerHTML   = Array.from({length:31}, (_,i) => `<option value="${String(i+1).padStart(2,'0')}">${i+1}</option>`).join('');
    monthEl.innerHTML = MK_MONTHS.map((m,i) => `<option value="${String(i+1).padStart(2,'0')}">${m}</option>`).join('');
    const curYear = date.getFullYear();
    yearEl.innerHTML  = [curYear, curYear+1].map(y => `<option value="${y}">${y}</option>`).join('');
    dayEl.value   = String(date.getDate()).padStart(2,'0');
    monthEl.value = String(date.getMonth()+1).padStart(2,'0');
    yearEl.value  = String(curYear);
  }

  function getDateValue() {
    const d = document.getElementById('f-day').value;
    const m = document.getElementById('f-month').value;
    const y = document.getElementById('f-year').value;
    return `${y}-${m}-${d}`;
  }

  function updateFileLabel(input) {
    const label = document.getElementById('file-label');
    if (input.files && input.files[0]) {
      label.textContent = '📷 ' + input.files[0].name;
      label.classList.add('has-file');
    } else {
      label.textContent = '📷 Избери слика...';
      label.classList.remove('has-file');
    }
  }

  function checkLogin() {
    const pwd = document.getElementById('pwd-input').value;
    if (pwd === ADMIN_PASSWORD) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-panel').style.display  = 'block';
      buildDateDropdowns(new Date());
      loadEventsList();
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  }

  function logout() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('admin-panel').style.display  = 'none';
    document.getElementById('pwd-input').value = '';
  }

  async function addNastan() {
    const title      = document.getElementById('f-title').value.trim();
    const place      = document.getElementById('f-place').value.trim();
    const kategorija = document.getElementById('f-kategorija').value;
    const emoji      = document.getElementById('f-emoji').value.trim() || '🎉';
    const datum      = getDateValue();
    const vreme      = document.getElementById('f-vreme').value.trim() || '20:00';
    const badge      = document.getElementById('f-badge').value.trim();
    const desc       = document.getElementById('f-desc').value.trim();
    const link       = document.getElementById('f-link').value.trim() || '#';
    const imageFile  = document.getElementById('f-image').files[0];

    if (!title || !place || !datum) {
      document.getElementById('error-msg').style.display   = 'block';
      document.getElementById('success-msg').style.display = 'none';
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled    = true;
    btn.textContent = 'Зачувување...';

    try {
      let imgSrc = '';
      if (imageFile) {
        btn.textContent = 'Прикачување слика...';
        const ref = storage.ref('events/' + Date.now() + '_' + imageFile.name);
        await ref.put(imageFile);
        imgSrc = await ref.getDownloadURL();
      }

      await db.collection('nastani').add({
        title, place, kategorija, imgEmoji: emoji, imgSrc,
        datum, vreme, badge, desc, link,
        createdAt: new Date().toISOString()
      });

      document.getElementById('success-msg').style.display = 'block';
      document.getElementById('error-msg').style.display   = 'none';
      document.getElementById('f-title').value = '';
      document.getElementById('f-place').value = '';
      document.getElementById('f-emoji').value = '';
      document.getElementById('f-badge').value = '';
      document.getElementById('f-desc').value  = '';
      document.getElementById('f-link').value  = '';
      document.getElementById('f-vreme').value = '';
      document.getElementById('f-image').value = '';
      document.getElementById('file-label').textContent = '📷 Избери слика...';
      document.getElementById('file-label').classList.remove('has-file');
      buildDateDropdowns(new Date());
      loadEventsList();
    } catch (err) {
      document.getElementById('error-msg').style.display   = 'block';
      document.getElementById('success-msg').style.display = 'none';
      console.error(err);
    }

    btn.disabled    = false;
    btn.textContent = 'Додај настан';
  }

  async function loadEventsList() {
    const listEl = document.getElementById('events-list');
    try {
      const snap = await db.collection('nastani').orderBy('datum').get();
      if (snap.empty) {
        listEl.innerHTML = '<div class="empty-list">Нема настани</div>';
        return;
      }
      listEl.innerHTML = snap.docs.map(d => {
        const n = d.data();
        return `
          <div class="event-item">
            <div class="event-info">
              <div class="event-title">${n.imgEmoji} ${n.title}</div>
              <div class="event-meta">${n.place} · ${n.datum} · ${n.vreme}</div>
            </div>
            <button class="delete-btn" onclick="deleteNastan('${d.id}')">Избриши</button>
          </div>
        `;
      }).join('');
    } catch (err) {
      listEl.innerHTML = '<div class="empty-list">Грешка при вчитување</div>';
    }
  }

  async function deleteNastan(id) {
    if (!confirm('Сигурен си дека сакаш да го избришеш настанот?')) return;
    try {
      await db.collection('nastani').doc(id).delete();
      loadEventsList();
    } catch (err) {
      alert('Грешка при бришење');
    }
  }
</script>
</body>
</html>
