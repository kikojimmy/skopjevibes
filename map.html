<!DOCTYPE html>
<html lang="mk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkopjeVibes – Мапа</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #0d0d0d; color: #f5f0e8; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Top bar ── */
    .topbar {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      background: #0d0d0d; border-bottom: 1px solid #1f1f1f; flex-shrink: 0; z-index: 1000;
    }
    .topbar-logo {
      font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800;
      color: #f5f0e8; text-decoration: none; white-space: nowrap;
    }
    .topbar-logo span { color: #ff5c35; }
    .topbar-logo small { font-size: 11px; color: #555; font-weight: 400; margin-left: 4px; }

    /* ── Filter chips ── */
    .filter-bar {
      display: flex; gap: 8px; padding: 10px 16px; overflow-x: auto;
      scrollbar-width: none; background: #0d0d0d; border-bottom: 1px solid #1a1a1a; flex-shrink: 0;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-family: 'DM Sans', sans-serif;
      cursor: pointer; border: 1px solid #2a2a2a; background: #161616; color: #888; transition: all 0.15s; white-space: nowrap;
    }
    .chip.active { background: #ff5c35; color: #fff; border-color: #ff5c35; }
    .chip[data-cat="klub"].active     { background: #a855f7; border-color: #a855f7; }
    .chip[data-cat="koncert"].active  { background: #ff5c35; border-color: #ff5c35; }
    .chip[data-cat="bar"].active      { background: #22c55e; border-color: #22c55e; }
    .chip[data-cat="kafana"].active   { background: #f59e0b; border-color: #f59e0b; }
    .chip[data-cat="sport-kultura"].active { background: #3b82f6; border-color: #3b82f6; }
    .chip[data-cat="kultura"].active  { background: #ec4899; border-color: #ec4899; }

    /* ── Map ── */
    #map { flex: 1; width: 100%; }

    /* ── Leaflet popup override ── */
    .leaflet-popup-content-wrapper {
      background: #161616 !important;
      border: 1px solid #2a2a2a !important;
      border-radius: 16px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
      color: #f5f0e8 !important;
      padding: 0 !important;
      overflow: hidden;
      min-width: 240px;
    }
    .leaflet-popup-tip { background: #161616 !important; }
    .leaflet-popup-content { margin: 0 !important; }
    .leaflet-popup-close-button { color: #555 !important; font-size: 18px !important; top: 10px !important; right: 12px !important; }
    .leaflet-popup-close-button:hover { color: #f5f0e8 !important; }

    .popup-img {
      width: 100%; height: 140px; object-fit: cover; display: block;
      background: #111;
    }
    .popup-img-placeholder {
      width: 100%; height: 140px; display: flex; align-items: center; justify-content: center;
      font-size: 40px; background: #111;
    }
    .popup-body { padding: 14px 16px 16px; }
    .popup-cat-badge {
      display: inline-block; font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; padding: 3px 10px; border-radius: 20px; margin-bottom: 8px;
    }
    .popup-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; line-height: 1.3; margin-bottom: 6px; }
    .popup-meta  { font-size: 12px; color: #888; margin-bottom: 4px; }
    .popup-place { font-size: 12px; color: #666; margin-bottom: 12px; }
    .popup-link {
      display: block; width: 100%; padding: 9px; background: #ff5c35; color: #fff;
      border-radius: 10px; text-align: center; text-decoration: none;
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
      transition: background 0.15s;
    }
    .popup-link:hover { background: #ff4520; }

    /* ── Count badge ── */
    #pin-count {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(13,13,13,0.85); backdrop-filter: blur(8px);
      border: 1px solid #2a2a2a; color: #888; padding: 6px 16px;
      border-radius: 20px; font-size: 12px; z-index: 1000; pointer-events: none;
    }
    #pin-count span { color: #f5f0e8; font-weight: 700; }
  </style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="topbar-logo">Skopje<span>Vibes</span><small>Мапа</small></a>
</div>

<div class="filter-bar" id="filter-bar">
  <div class="chip active" data-cat="all">Сите</div>
  <div class="chip" data-cat="klub">🎧 Клуб</div>
  <div class="chip" data-cat="koncert">🎵 Концерт</div>
  <div class="chip" data-cat="bar">🍹 Бар</div>
  <div class="chip" data-cat="kafana">🍺 Кафана</div>
  <div class="chip" data-cat="sport-kultura">⚽ Спорт</div>
  <div class="chip" data-cat="kultura">🎭 Култура</div>
</div>

<div id="map"></div>
<div id="pin-count">Вчитување...</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
  import { initializeApp }     from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDOxqfSkmXbRYbMW0ph2aOM-35BDJOAk5E",
    authDomain: "skopjevibes-df97b.firebaseapp.com",
    projectId: "skopjevibes-df97b",
    storageBucket: "skopjevibes-df97b.firebasestorage.app",
    messagingSenderId: "534773019597",
    appId: "1:534773019597:web:82ff3ea8a88f43eee90a84"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // ── Category config ──
  const CAT = {
    klub:          { color: '#a855f7', label: '🎧 Клуб',   bg: '#2d1a4a' },
    koncert:       { color: '#ff5c35', label: '🎵 Концерт', bg: '#3a1a10' },
    bar:           { color: '#22c55e', label: '🍹 Бар',     bg: '#0f2a1a' },
    kafana:        { color: '#f59e0b', label: '🍺 Кафана',  bg: '#2a2010' },
    'sport-kultura':{ color: '#3b82f6', label: '⚽ Спорт',  bg: '#0f1a3a' },
    kultura:       { color: '#ec4899', label: '🎭 Култура', bg: '#2a0f20' },
  };
  const DEFAULT_COLOR = '#ff5c35';

  // ── Init map ──
  const map = L.map('map', {
    center: [42.0003, 21.4290],
    zoom: 14,
    zoomControl: true,
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap contributors © CARTO',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  // ── Custom circle marker factory ──
  function makeIcon(color) {
    return L.divIcon({
      className: '',
      html: `<div style="
        width:14px; height:14px; border-radius:50%;
        background:${color}; border:2px solid rgba(255,255,255,0.25);
        box-shadow:0 0 8px ${color}88;
      "></div>`,
      iconSize: [14, 14],
      iconAnchor: [7, 7],
      popupAnchor: [0, -10],
    });
  }

  // ── Popup HTML builder ──
  function buildPopup(n) {
    const cat   = CAT[n.kategorija] || { color: DEFAULT_COLOR, label: n.kategorija || '', bg: '#1a1a1a' };
    const img   = n.imgSrc
      ? `<img class="popup-img" src="${n.imgSrc}" alt="" onerror="this.style.display='none'" />`
      : `<div class="popup-img-placeholder">${n.imgEmoji || '🎉'}</div>`;
    const link  = n.instagramUrl
      ? `<a class="popup-link" href="${n.instagramUrl}" target="_blank" rel="noopener">Повеќе инфо →</a>`
      : '';
    const meta  = [n.datum, n.vreme].filter(Boolean).join(' · ');
    return `
      ${img}
      <div class="popup-body">
        <div class="popup-cat-badge" style="background:${cat.bg};color:${cat.color}">${cat.label}</div>
        <div class="popup-title">${n.title || ''}</div>
        ${meta ? `<div class="popup-meta">${meta}</div>` : ''}
        ${n.place ? `<div class="popup-place">📍 ${n.place}</div>` : ''}
        ${link}
      </div>
    `;
  }

  // ── State ──
  let allEvents = [];
  let markers   = [];
  let activeCat = 'all';

  function renderMarkers() {
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    const visible = activeCat === 'all'
      ? allEvents
      : allEvents.filter(e => e.kategorija === activeCat);

    visible.forEach(n => {
      const color = (CAT[n.kategorija] || {}).color || DEFAULT_COLOR;
      const m = L.marker([n.lat, n.lng], { icon: makeIcon(color) })
        .bindPopup(buildPopup(n), { maxWidth: 280, minWidth: 240 })
        .addTo(map);
      markers.push(m);
    });

    const total = allEvents.length;
    const shown = visible.length;
    document.getElementById('pin-count').innerHTML =
      `Прикажани <span>${shown}</span> од <span>${total}</span> настани`;
  }

  // ── Load events ──
  async function loadEvents() {
    const snap = await getDocs(collection(db, 'nastani'));
    allEvents = [];
    snap.forEach(d => {
      const n = { id: d.id, ...d.data() };
      if (n.lat && n.lng) allEvents.push(n);
    });
    renderMarkers();
  }

  loadEvents().catch(err => {
    document.getElementById('pin-count').textContent = 'Грешка при вчитување';
    console.error(err);
  });

  // ── Filter chips ──
  document.getElementById('filter-bar').addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeCat = chip.dataset.cat;
    renderMarkers();
  });
</script>
</body>
</html>
