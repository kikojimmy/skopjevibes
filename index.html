<!DOCTYPE html>
<html lang="mk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-site-verification" content="96Pn78-wAMrclH9-Alhoi58KG4yZSew79qom15wPbvc" />
  <title>SkopjeVibes – Настани во Скопје</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #0d0d0d; color: #f5f0e8; min-height: 100vh; padding-bottom: 60px; }

    nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #1f1f1f; position: sticky; top: 0; background: #0d0d0d; z-index: 10; }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -0.5px; }
    .logo span { color: #ff5c35; }
    .live-tag { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #666; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #4cff91; animation: pulse 1.5s infinite; flex-shrink: 0; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .above-fold { min-height: calc(100svh - 53px); display: flex; flex-direction: column; justify-content: center; padding-bottom: 24px; }
    .hero { padding: 0 24px 28px; text-align: center; }
    .hero h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 34px; line-height: 1.1; letter-spacing: -1px; margin-bottom: 8px; }
    .hero h1 em { color: #ff5c35; font-style: normal; }
    .hero p { color: #666; font-size: 14px; }

    .filters { display: flex; gap: 8px; padding: 0 20px; overflow-x: auto; scrollbar-width: none; flex-wrap: nowrap; }
    .filters::-webkit-scrollbar { display: none; }
    .chip { flex-shrink: 0; border: 1px solid #2a2a2a; background: #161616; color: #aaa; padding: 7px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
    .chip.active { background: #ff5c35; border-color: #ff5c35; color: #fff; }
    .chip:hover:not(.active) { border-color: #444; color: #f5f0e8; }

    .days-wrap { overflow: hidden; max-height: 0; opacity: 0; transition: max-height 0.35s ease, opacity 0.25s ease, padding 0.3s ease; padding: 0 20px; }
    .days-wrap.visible { max-height: 120px; opacity: 1; padding: 14px 20px 4px; }
    .days-scroll { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; flex-wrap: nowrap; }
    .days-scroll::-webkit-scrollbar { display: none; }
    .day-pill { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 9px 13px; border-radius: 14px; background: #161616; border: 1px solid #1f1f1f; cursor: pointer; transition: all 0.15s; min-width: 52px; }
    .day-pill:hover:not(.active) { border-color: #333; }
    .day-pill.active { background: #ff5c35; border-color: #ff5c35; }
    .day-pill.today:not(.active) { border-color: #ff5c35; }
    .day-pill.today:not(.active) .day-name { color: #ff5c35; }
    .day-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 11px; color: #aaa; }
    .day-pill.active .day-name, .day-pill.active .day-date { color: #fff; }
    .day-date { font-size: 10px; color: #555; }

    .section-label { padding: 20px 20px 10px; }
    .section-label small { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: #ff5c35; font-weight: 500; display: block; margin-bottom: 4px; }
    .section-label h2 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px; align-items: start; }
    .card { background: #161616; border-radius: 14px; overflow: hidden; border: 1px solid #1f1f1f; cursor: pointer; transition: transform 0.15s, border-color 0.15s; display: flex; flex-direction: column; }
    .card:hover { transform: translateY(-2px); border-color: #333; }
    .card-img { width: 100%; height: 88px; display: flex; align-items: center; justify-content: center; font-size: 24px; overflow: hidden; }
    .card-img img { width: 100%; height: 100%; object-fit: cover; }
    .club-bg    { background: linear-gradient(135deg, #1a0a2e, #2d1b4e); }
    .concert-bg { background: linear-gradient(135deg, #0a1a2e, #1b2d4e); }
    .bar-bg     { background: linear-gradient(135deg, #1a1a0a, #3a2d10); }
    .kafana-bg  { background: linear-gradient(135deg, #1a0f00, #3d2500); }
    .sport-bg   { background: linear-gradient(135deg, #0a1a0a, #1b3a1b); }
    .kultura-bg { background: linear-gradient(135deg, #2e0a1a, #4e1b2d); }
    .card-body { padding: 8px 10px; flex: 1; display: flex; flex-direction: column; gap: 3px; }
    .card-cat { font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; color: #ff5c35; }
    .card-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px; line-height: 1.2; }
    .card-place { font-size: 11px; color: #777; }
    .card-date  { font-size: 10px; color: #555; }
    .badge { display: inline-block; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 20px; font-size: 9px; color: #666; padding: 2px 7px; margin-top: 4px; align-self: flex-start; }
    .no-results { grid-column: 1/-1; text-align: center; padding: 40px 0; color: #444; font-size: 13px; }

    /* Loading spinner */
    .loading { grid-column: 1/-1; text-align: center; padding: 40px 0; color: #555; font-size: 13px; }
    .spinner { width: 24px; height: 24px; border: 2px solid #2a2a2a; border-top-color: #ff5c35; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Bottom sheet */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.25s ease; backdrop-filter: blur(3px); }
    .overlay.open { opacity: 1; pointer-events: all; }
    .sheet { position: fixed; bottom: 0; left: 0; right: 0; background: #161616; border-radius: 22px 22px 0 0; border-top: 1px solid #2a2a2a; z-index: 101; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1); max-height: 82vh; overflow-y: auto; }
    .sheet.open { transform: translateY(0); }
    .sheet-handle { width: 36px; height: 4px; background: #333; border-radius: 2px; margin: 12px auto 0; }
    .sheet-img { width: 100%; height: 200px; display: flex; align-items: center; justify-content: center; font-size: 48px; overflow: hidden; }
    .sheet-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .sheet-body { padding: 16px 20px 36px; }
    .sheet-cat { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 1.5px; color: #ff5c35; margin-bottom: 6px; }
    .sheet-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; line-height: 1.15; margin-bottom: 12px; }
    .sheet-meta { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }
    .sheet-meta-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #999; }
    .sheet-meta-row span:first-child { font-size: 16px; }
    .sheet-desc { font-size: 13px; color: #777; line-height: 1.6; margin-bottom: 20px; }
    .sheet-badge { display: inline-block; background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 20px; font-size: 11px; color: #aaa; padding: 4px 12px; margin-bottom: 20px; }
    .sheet-btn { display: block; width: 100%; background: #ff5c35; color: #fff; border: none; border-radius: 14px; padding: 15px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; text-align: center; transition: background 0.15s; text-decoration: none; }
    .sheet-btn:hover { background: #ff4520; }

    @media (max-width: 380px) { .grid { grid-template-columns: 1fr; } .hero h1 { font-size: 28px; } }
    @media (min-width: 600px) {
      .above-fold { align-items: center; }
      .filters { justify-content: center; flex-wrap: wrap; max-width: 600px; margin: 0 auto; }
      .days-wrap { max-width: 600px; margin: 0 auto; }
      .days-scroll { justify-content: center; }
      .section-label { max-width: 600px; margin: 0 auto; }
      .grid { max-width: 600px; margin: 0 auto; }
    }
  </style>
</head>
<body>

<nav>
  <div class="logo">Skopje<span>Vibes</span></div>
  <div class="live-tag"><span class="dot"></span>Live</div>
</nav>

<div class="above-fold">
  <div class="hero">
    <h1>Каде излегуваш<br><em>вечерва?</em></h1>
    <p>Сите настани во Скопје на едно место</p>
  </div>

  <div class="filters">
    <div class="chip active" onclick="window.filterCat(this,'site')">🎉 Сите</div>
    <div class="chip" onclick="window.filterCat(this,'bar')">🍹 Бар</div>
    <div class="chip" onclick="window.filterCat(this,'kafana')">🍺 Кафана</div>
    <div class="chip" onclick="window.filterCat(this,'koncert')">🎵 Концерт</div>
    <div class="chip" onclick="window.filterCat(this,'klub')">🎧 Клуб</div>
    <div class="chip" onclick="window.filterCat(this,'sport-kultura')">⚽ Спорт и Култура</div>
  </div>

  <div class="days-wrap" id="days-wrap">
    <div class="days-scroll" id="days-scroll"></div>
  </div>
</div>

<div class="section-label">
  <small id="date-label">Денес</small>
  <h2>Вечерва во Скопје</h2>
</div>

<div class="grid" id="grid">
  <div class="loading"><div class="spinner"></div>Вчитување...</div>
</div>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-img" id="sheet-img"></div>
  <div class="sheet-body">
    <div class="sheet-cat" id="sheet-cat"></div>
    <div class="sheet-title" id="sheet-title"></div>
    <div class="sheet-meta" id="sheet-meta"></div>
    <div class="sheet-desc" id="sheet-desc"></div>
    <div id="sheet-badge-wrap"></div>
    <a class="sheet-btn" id="sheet-btn" target="_blank">Локација →</a>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDOxqfSkmXbRYbMW0ph2aOM-35BDJOAk5E",
    authDomain: "skopjevibes-df97b.firebaseapp.com",
    projectId: "skopjevibes-df97b",
    storageBucket: "skopjevibes-df97b.firebasestorage.app",
    messagingSenderId: "534773019597",
    appId: "1:534773019597:web:82ff3ea8a88f43eee90a84",
    measurementId: "G-HWH14N5VSV"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  const imgClassMap  = { klub: 'club-bg', koncert: 'concert-bg', bar: 'bar-bg', kafana: 'kafana-bg', sport: 'sport-bg', kultura: 'kultura-bg', 'sport-kultura': 'sport-bg' };
  const catMap       = { klub: 'Клуб', koncert: 'Концерт', bar: 'Бар', kafana: 'Кафана', sport: 'Спорт и Култура', kultura: 'Спорт и Култура', 'sport-kultura': 'Спорт и Култура' };
  const catEmojiMap  = { klub: '🎧', koncert: '🎵', bar: '🍹', kafana: '🍺', sport: '⚽', kultura: '🎭', 'sport-kultura': '⚽' };

  const dayNames = ['Недела','Понеделник','Вторник','Среда','Четврток','Петок','Сабота'];
  const dayShort = ['Нед','Пон','Вто','Сре','Чет','Пет','Саб'];
  const months   = ['Јануари','Февруари','Март','Април','Мај','Јуни','Јули','Август','Септември','Октомври','Ноември','Декември'];

  const now      = new Date();
  const todayStr = now.toISOString().split('T')[0]; // "2025-03-30"

  let nastani    = [];
  let activeCat  = 'site';
  let activeDay  = 0;
  let artistsMap = {};

  // ── Load from Firestore ──
  async function loadNastani() {
    try {
      const [eventsSnap, artistsSnap] = await Promise.all([
        getDocs(query(collection(db, 'nastani'), orderBy('datum'))),
        getDocs(collection(db, 'artists'))
      ]);
      artistsSnap.docs.forEach(doc => { artistsMap[doc.id] = doc.data(); });
      const snap = eventsSnap;
      nastani    = snap.docs.map(doc => {
        const d   = doc.data();
        const den = daysBetween(todayStr, d.datum);
        return {
          id:         doc.id,
          den,
          kategorija: d.kategorija,
          imgClass:   imgClassMap[d.kategorija] || 'club-bg',
          imgSrc:     d.imgSrc || '',
          imgEmoji:   catEmojiMap[d.kategorija] || d.imgEmoji || '🎉',
          cat:        catMap[d.kategorija] || d.kategorija,
          title:      d.title,
          place:      d.place,
          date:       formatDate(d.datum, d.vreme),
          badge:      d.badge || '',
          desc:       d.desc || '',
          location:   d.location || '',
          artistIds:  d.artistIds || []
        };
      }).filter(n => n.den >= 0 && n.den <= 6); // само следните 7 дена

      buildDays();
      renderCards('site');
    } catch (err) {
      document.getElementById('grid').innerHTML = '<div class="no-results">Грешка при вчитување</div>';
      console.error(err);
    }
  }

  function daysBetween(from, to) {
    const a = new Date(from + 'T00:00:00');
    const b = new Date(to   + 'T00:00:00');
    return Math.round((b - a) / 86400000);
  }

  function formatDate(datum, vreme) {
    const den = daysBetween(todayStr, datum);
    const prefix = den === 0 ? 'Денес' : den === 1 ? 'Утре' : dayNames[new Date(datum + 'T00:00:00').getDay()];
    return `${prefix} · ${vreme}`;
  }

  // ── Popup ──
  function openSheet(idx) {
    const n   = nastani[idx];
    const img = document.getElementById('sheet-img');
    img.className = 'sheet-img ' + n.imgClass;
    img.innerHTML = n.imgSrc ? `<img src="${n.imgSrc}" alt="${n.title}" onerror="imgError(this,'${n.imgEmoji}')" />` : n.imgEmoji;
    document.getElementById('sheet-cat').textContent   = n.cat;
    document.getElementById('sheet-title').textContent = n.title;
    document.getElementById('sheet-desc').textContent  = n.desc;
    const performers = n.artistIds.map(id => artistsMap[id]).filter(Boolean);
    const artistRow  = performers.length
      ? `<div class="sheet-meta-row"><span>🎤</span><span>${performers.map(a => a.nickname || a.name).join(', ')}</span></div>`
      : '';
    document.getElementById('sheet-meta').innerHTML = `
      <div class="sheet-meta-row"><span>📍</span><span>${n.place}</span></div>
      <div class="sheet-meta-row"><span>🕐</span><span>${n.date}</span></div>
      ${artistRow}
    `;
    document.getElementById('sheet-badge-wrap').innerHTML = n.badge ? `<div class="sheet-badge">${n.badge}</div>` : '';
    const btn = document.getElementById('sheet-btn');
    if (n.location) { btn.href = n.location; btn.style.display = 'block'; }
    else { btn.style.display = 'none'; }
    document.getElementById('overlay').classList.add('open');
    document.getElementById('sheet').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  window.openSheet = openSheet;
  window.imgError  = (el, emoji) => { el.parentElement.innerHTML = emoji; };

  function closeSheet() {
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('sheet').classList.remove('open');
    document.body.style.overflow = '';
  }
  window.closeSheet = closeSheet;

  let startY = 0;
  document.getElementById('sheet').addEventListener('touchstart', e => { startY = e.touches[0].clientY; });
  document.getElementById('sheet').addEventListener('touchend',   e => { if (e.changedTouches[0].clientY - startY > 60) closeSheet(); });

  // ── Days ──
  function buildDays() {
    const wrap = document.getElementById('days-scroll');
    wrap.innerHTML = '';
    for (let i = 0; i < 7; i++) {
      const d    = new Date(now);
      d.setDate(now.getDate() + i);
      const pill = document.createElement('div');
      pill.className = 'day-pill' + (i === 0 ? ' today' : '') + (i === activeDay ? ' active' : '');
      pill.innerHTML = `
        <div class="day-name">${dayShort[d.getDay()]}</div>
        <div class="day-date">${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}</div>
      `;
      pill.onclick = () => {
        activeDay = i;
        buildDays();
        renderCards(activeCat);
        setTimeout(() => document.querySelector('.section-label').scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
      };
      wrap.appendChild(pill);
    }
  }

  function updateLabel() {
    const d     = new Date(now);
    d.setDate(now.getDate() + activeDay);
    const label = activeDay === 0 ? dayNames[now.getDay()] : activeDay === 1 ? 'Утре' : dayNames[d.getDay()];
    document.getElementById('date-label').textContent = `${label}, ${d.getDate()} ${months[d.getMonth()]}`;
  }

  function renderCards(cat) {
    activeCat = cat;
    updateLabel();
    const grid     = document.getElementById('grid');
    const filtered = nastani.map((n, i) => ({ ...n, _idx: i })).filter(n => {
      const catOk = cat === 'site' ||
                  (cat === 'sport-kultura' ? ['sport','kultura','sport-kultura'].includes(n.kategorija) : n.kategorija === cat);
      const dayOk = cat === 'site' || n.den === activeDay;
      return catOk && dayOk;
    });
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="no-results">Нема настани за овој ден</div>';
      return;
    }
    grid.innerHTML = filtered.map(n => `
      <div class="card" onclick="openSheet(${n._idx})">
        <div class="card-img ${n.imgClass}">
          ${n.imgSrc ? `<img src="${n.imgSrc}" alt="${n.title}" onerror="imgError(this,'${n.imgEmoji}')" />` : n.imgEmoji}
        </div>
        <div class="card-body">
          <div class="card-cat">${n.cat}</div>
          <div class="card-title">${n.title}</div>
          <div class="card-place">${n.place}</div>
          <div class="card-date">${n.date}</div>
          ${n.badge ? `<div class="badge">${n.badge}</div>` : ''}
        </div>
      </div>
    `).join('');
  }
  window.renderCards = renderCards;

  function filterCat(el, cat) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    const daysWrap = document.getElementById('days-wrap');
    if (cat !== 'site') { daysWrap.classList.add('visible'); }
    else { daysWrap.classList.remove('visible'); activeDay = 0; buildDays(); }
    renderCards(cat);
  }
  window.filterCat = filterCat;

  loadNastani();
</script>
</body>
</html>
